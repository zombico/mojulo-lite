        // ============================================================
        // Optical Read upload + render
        //
        // Two turns:
        //   Turn 1 — POST /api/extract: image → model → extractedFields. The
        //            bot side hashes the image bytes into the chain.
        //   Turn 2 — Send: user-attested values posted to /api/submit-form
        //            with metadata.source: 'optical_read'. The diff between
        //            Turn 1 and Turn 2 is the audit trail.
        //
        // The fields rendered after extraction start disabled (read-only) so
        // the user reviews before editing; Send unlocks them, then validates
        // and submits.
        // ============================================================

        const OPTICAL_READ_MAX_BYTES = 5 * 1024 * 1024;
        const OPTICAL_READ_TARGET_PIXELS = 3500000; // ~3.5 MP downscale target

        // Open the OS file picker, run the upload pipeline (downscale →
        // /api/extract → render extracted fields). onProgress receives state
        // strings the caller can use to update its own UI ('reading',
        // 'done', 'error'). Returns a promise that resolves once the
        // extracted-fields panel is on screen (or rejects on failure).
        function triggerOpticalReadUpload({ onProgress } = {}) {
            return new Promise((resolve, reject) => {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/png,image/jpeg,image/webp';
                fileInput.style.display = 'none';
                document.body.appendChild(fileInput);

                fileInput.addEventListener('change', async (event) => {
                    const file = event.target.files?.[0];
                    fileInput.remove();
                    if (!file) {
                        resolve(false);
                        return;
                    }
                    onProgress?.('reading');
                    try {
                        const { base64, mime } = await prepareImageForUpload(file);
                        await runOpticalRead({ base64, mime, fileName: file.name });
                        onProgress?.('done');
                        resolve(true);
                    } catch (err) {
                        console.error('Optical Read failed:', err);
                        addMessage(`Could not read that image: ${err.message || err}`, true, false, null, null, null, true, true);
                        onProgress?.('error');
                        reject(err);
                    }
                });

                // Cancel-safe: if the user closes the picker without picking,
                // the change event never fires. Cleanup happens on the next
                // window focus.
                window.addEventListener(
                    'focus',
                    () => {
                        setTimeout(() => {
                            if (fileInput.isConnected && !fileInput.files?.length) {
                                fileInput.remove();
                                resolve(false);
                            }
                        }, 200);
                    },
                    { once: true }
                );

                fileInput.click();
            });
        }

        function createUploadCard() {
            if (!botContext?.opticalReadFields || botContext.opticalReadFields.length === 0) {
                console.warn('No opticalReadFields configured; suppressing upload card');
                return null;
            }

            const container = document.createElement('div');
            container.className = 'calendar-card-container';

            const card = document.createElement('button');
            card.className = 'calendar-card';
            card.setAttribute('type', 'button');

            const labelElement = document.createElement('span');
            labelElement.className = 'calendar-card-label';
            labelElement.textContent = 'Upload an image';
            card.appendChild(labelElement);

            const iconElement = document.createElement('span');
            iconElement.className = 'calendar-card-icon';
            iconElement.textContent = '📎';
            card.appendChild(iconElement);

            card.addEventListener('click', async () => {
                card.disabled = true;
                try {
                    // Remove the upload card the moment the file is picked
                    // (well before /api/extract returns) so the user doesn't
                    // see a "Reading..." button next to the rendered form.
                    await triggerOpticalReadUpload({
                        onProgress: (state) => {
                            if (state === 'reading') container.remove();
                        },
                    });
                } catch {
                    if (container.isConnected) {
                        card.disabled = false;
                        labelElement.textContent = 'Upload an image';
                    }
                }
            });

            container.appendChild(card);
            return container;
        }

        // Starter-strip variant: same upload pipeline, but styled as a
        // suggested-prompt-card so it slots naturally into the first-message
        // suggestions row. Gated by botContext.opticalReadShowUploadOnStart.
        function createUploadStarterCard() {
            if (!botContext?.opticalReadFields || botContext.opticalReadFields.length === 0) {
                return null;
            }

            const card = document.createElement('div');
            card.className = 'suggested-prompt-card';
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');

            const promptElement = document.createElement('span');
            promptElement.className = 'suggested-prompt';
            promptElement.textContent = '📎  Upload an image';
            card.appendChild(promptElement);

            const startUpload = async () => {
                if (card.dataset.busy === '1') return;
                card.dataset.busy = '1';
                try {
                    // Hide the suggested-prompts strip the moment the file
                    // is picked, before /api/extract is even called — keeps
                    // the "Reading..." card from sitting next to the form
                    // once it lands. Cancelled picker = strip stays put.
                    await triggerOpticalReadUpload({
                        onProgress: (state) => {
                            if (state === 'reading') {
                                suggestedPromptsContainer.style.display = 'none';
                            }
                        },
                    });
                    if (suggestedPromptsContainer.style.display !== 'none') {
                        card.dataset.busy = '0';
                        promptElement.textContent = '📎  Upload an image';
                    }
                } catch {
                    if (suggestedPromptsContainer.style.display !== 'none') {
                        card.dataset.busy = '0';
                        promptElement.textContent = '📎  Upload an image';
                    }
                }
            };

            card.addEventListener('click', startUpload);
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    startUpload();
                }
            });

            return card;
        }

        // Read a file as base64 and downscale through canvas if needed. Output
        // is plain base64 (no data: prefix); the server tolerates either but
        // we strip on the way out for a clean payload.
        async function prepareImageForUpload(file) {
            if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) {
                throw new Error('Image must be PNG, JPEG, or WebP');
            }

            // Decode to bitmap so we can measure (and resize if needed).
            const arrayBuffer = await file.arrayBuffer();
            const bytes = new Uint8Array(arrayBuffer);
            const blob = new Blob([bytes], { type: file.type });

            let outBase64;
            let outMime = file.type;

            if (bytes.byteLength <= OPTICAL_READ_MAX_BYTES) {
                outBase64 = await blobToBase64(blob);
            } else {
                const bitmap = await createImageBitmap(blob);
                const ratio = Math.sqrt(OPTICAL_READ_TARGET_PIXELS / (bitmap.width * bitmap.height));
                const scale = Math.min(1, ratio);
                const w = Math.max(1, Math.round(bitmap.width * scale));
                const h = Math.max(1, Math.round(bitmap.height * scale));
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0, w, h);
                // JPEG re-encode is the safest cross-browser path; preserve
                // PNG/WebP only when the source already fit under the cap.
                const downsampled = await new Promise((resolve, reject) => {
                    canvas.toBlob(
                        (b) => (b ? resolve(b) : reject(new Error('canvas.toBlob failed'))),
                        'image/jpeg',
                        0.9
                    );
                });
                if (downsampled.size > OPTICAL_READ_MAX_BYTES) {
                    throw new Error('Image is too large even after downscale');
                }
                outBase64 = await blobToBase64(downsampled);
                outMime = 'image/jpeg';
            }

            return { base64: outBase64, mime: outMime };
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = reader.result;
                    const idx = typeof result === 'string' ? result.indexOf(',') : -1;
                    resolve(idx >= 0 ? result.slice(idx + 1) : result);
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function runOpticalRead({ base64, mime, fileName }) {
            // Reuse the /chat thinking-dots pattern: addMessage with the
            // thinking flag drops a bot bubble whose ::after is animated by
            // the #thinking-div CSS rule. Removed right before the form
            // lands so the user sees one continuous loading → form sequence.
            addMessage(' ', true, true, null, null, null, true, true);
            const thinkingBubble = messagesDiv.lastElementChild;
            const removeThinking = () => {
                if (thinkingBubble && thinkingBubble.isConnected) {
                    thinkingBubble.remove();
                }
            };

            let data;
            try {
                const response = await fetch(`${API_URL}/api/extract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversationId, fileName, mime, base64 }),
                });
                data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || `Extract failed (${response.status})`);
                }
            } catch (err) {
                removeThinking();
                throw err;
            }

            // Adopt the conversationId minted by the bot if we didn't have one.
            if (!conversationId && data.conversationId) {
                conversationId = data.conversationId;
            }
            currentChainHash = data.chainHash || currentChainHash;

            // Suppress the model's prose response — Optical Read's deliverable
            // is the pre-filled form, not a chat answer. The only time we
            // surface answer text is when extraction came back fully empty
            // (image unreadable / wrong artifact type), and we slot it as a
            // tiny note above the (empty) form so the user gets feedback.
            const extraction = data.extraction || {};
            const extracted = extraction.fields || {};
            const allEmpty = Object.values(extracted).every((v) => !v);
            const note = allEmpty && data.answer ? data.answer : null;

            removeThinking();

            // Create an empty bot bubble for the form to attach to. Skips the
            // streaming-text path (no answer prose to stream).
            addMessage('', true, false, null, null, null, true);

            const messageContent = messagesDiv.lastChild.querySelector('.message-content');
            const fieldsCard = renderExtractedFields(extracted, note);
            if (fieldsCard) {
                messageContent.appendChild(fieldsCard);
            }
            const confidenceBlock = renderExtractionConfidence(
                extraction.confidence,
                extraction.notes
            );
            if (confidenceBlock) {
                messageContent.appendChild(confidenceBlock);
            }

            const lastMessage = messagesDiv.lastElementChild;
            if (lastMessage) {
                lastMessage.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        function renderExtractedFields(extractedFields, note = null) {
            const fields = botContext?.opticalReadFields || [];
            if (fields.length === 0) return null;

            const container = document.createElement('div');
            container.className = 'optical-read-fields';

            // Only surfaced when extraction came back fully empty — gives the
            // user the model's "couldn't read this" explanation without
            // streaming a redundant chat bubble.
            if (note) {
                const noteEl = document.createElement('div');
                noteEl.className = 'optical-read-fields-note';
                noteEl.textContent = note;
                container.appendChild(noteEl);
            }

            const inputs = new Map();

            fields.forEach((field) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'optical-read-field';

                const label = document.createElement('label');
                label.className = 'optical-read-field-label';
                label.textContent = field.label;
                label.setAttribute('for', `optical-${field.idName}`);
                wrapper.appendChild(label);

                const input = document.createElement('input');
                input.className = 'optical-read-field-input';
                input.type = 'text';
                input.id = `optical-${field.idName}`;
                input.value = extractedFields[field.idName] || '';
                input.disabled = true;
                wrapper.appendChild(input);

                inputs.set(field.idName, input);
                container.appendChild(wrapper);
            });

            const buttonRow = document.createElement('div');
            buttonRow.className = 'optical-read-fields-actions';

            const editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.textContent = 'Edit';
            editBtn.className = 'calendar-card';

            const sendBtn = document.createElement('button');
            sendBtn.type = 'button';
            sendBtn.textContent = 'Send';
            sendBtn.className = 'calendar-card';

            editBtn.addEventListener('click', () => {
                inputs.forEach((input) => {
                    input.disabled = false;
                });
                editBtn.disabled = true;
            });

            sendBtn.addEventListener('click', async () => {
                sendBtn.disabled = true;
                editBtn.disabled = true;
                sendBtn.textContent = 'Sending...';
                try {
                    const formData = {};
                    inputs.forEach((input, idName) => {
                        formData[idName] = input.value;
                    });
                    const resp = await fetch(`${API_URL}/api/submit-form`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversationId,
                            formData,
                            metadata: { source: 'optical_read' },
                        }),
                    });
                    if (!resp.ok) {
                        const body = await resp.json().catch(() => ({}));
                        throw new Error(body.error || `Submit failed (${resp.status})`);
                    }
                    sendBtn.textContent = 'Sent';
                    inputs.forEach((input) => {
                        input.disabled = true;
                    });
                    if (botContext?.opticalReadAfterSubmitMessage) {
                        addMessage(botContext.opticalReadAfterSubmitMessage, true, false, null, null, null, true, true);
                    }
                } catch (err) {
                    console.error('Optical Read submit failed:', err);
                    addMessage(`Submit failed: ${err.message || err}`, true, false, null, null, null, true, true);
                    sendBtn.disabled = false;
                    editBtn.disabled = false;
                    sendBtn.textContent = 'Send';
                }
            });

            buttonRow.appendChild(editBtn);
            buttonRow.appendChild(sendBtn);
            container.appendChild(buttonRow);

            return container;
        }

        // Render the extraction quality signal as a small badge + rationale,
        // sitting underneath the extracted-fields card. Three-tier categorical
        // (high/medium/low) so the user gets a fast at-a-glance confidence
        // read; the notes string is the model's one-sentence rationale.
        function renderExtractionConfidence(confidence, notes) {
            if (!confidence && !notes) return null;

            const TIER_LABELS = { high: 'High', medium: 'Medium', low: 'Low' };
            const tier = TIER_LABELS[confidence] ? confidence : 'medium';

            const container = document.createElement('div');
            container.className = `optical-read-confidence optical-read-confidence--${tier}`;

            const header = document.createElement('div');
            header.className = 'optical-read-confidence-header';

            const dot = document.createElement('span');
            dot.className = 'optical-read-confidence-dot';
            header.appendChild(dot);

            const labelTitle = document.createElement('span');
            labelTitle.className = 'optical-read-confidence-label';
            labelTitle.textContent = 'Extraction confidence';
            header.appendChild(labelTitle);

            const value = document.createElement('span');
            value.className = 'optical-read-confidence-value';
            value.textContent = TIER_LABELS[tier];
            header.appendChild(value);

            container.appendChild(header);

            if (notes) {
                const notesEl = document.createElement('div');
                notesEl.className = 'optical-read-confidence-notes';
                notesEl.textContent = notes;
                container.appendChild(notesEl);
            }

            return container;
        }

        // Create a triage card element (with link and starterPrompt)
        // Clicking navigates to link with ?prompt=starterPrompt&source=configName to auto-start conversation
        function createTriageCard(link, starterPrompt, directedBotName, deploymentId) {
            const container = document.createElement('div');
            container.className = 'triage-prompts-container';

            const card = document.createElement('a');
            card.className = 'triage-prompt-card';

            // Build URL with prompt and source parameters
            const url = new URL(link);
            url.searchParams.set('prompt', starterPrompt);
            url.searchParams.set('source', botContext.name);
            // Forward conversationId as a cross-bot correlation ID so the receiver
            // can stitch its own chain to the same logical conversation.
            if (conversationId) {
                url.searchParams.set('conversationId', conversationId);
            }
            // Forward sender's tip-of-chain so the receiver's first turn
            // descends from it. Forgeable on its own — the trust upgrade comes
            // in v2 (signed handoff token + aggregator verification).
            if (currentChainHash) {
                url.searchParams.set('chainHash', currentChainHash);
            }
            card.href = url.toString();

            card.setAttribute('role', 'link');

            const targetUrl = url.toString();

            // Show routing overlay on click + record handoff as a chained event
            // on this (sender) bot. sendBeacon is fire-and-forget across
            // navigation — best-effort delivery is acceptable; worst case is
            // one missing audit row, the user is still routed correctly.
            card.addEventListener('click', () => {
                if (conversationId && deploymentId && navigator.sendBeacon) {
                    try {
                        const payload = JSON.stringify({
                            conversationId,
                            deploymentId,
                            starterPrompt,
                            targetUrl
                        });
                        navigator.sendBeacon(
                            `${API_URL}/handoff`,
                            new Blob([payload], { type: 'application/json' })
                        );
                    } catch (e) {
                        console.warn('Handoff beacon failed:', e);
                    }
                }

                const overlay = document.createElement('div');
                overlay.className = 'routing-overlay';

                const spinner = document.createElement('div');
                spinner.className = 'routing-overlay-spinner';

                const text = document.createElement('div');
                text.className = 'routing-overlay-text';
                const routingTarget = directedBotName || 'new assistant';
                text.textContent = `Routing to ${routingTarget}...`;

                overlay.appendChild(spinner);
                overlay.appendChild(text);
                document.body.appendChild(overlay);
            });

            const labelElement = document.createElement('span');
            labelElement.className = 'triage-prompt-label';
            labelElement.textContent = starterPrompt;
            card.appendChild(labelElement);

            const linkIcon = document.createElement('span');
            linkIcon.className = 'triage-prompt-icon';
            linkIcon.textContent = '↗';
            card.appendChild(linkIcon);

            container.appendChild(card);

            // Add helper text if directed bot name is provided
            if (directedBotName) {
                const helperText = document.createElement('div');
                helperText.style.cssText = 'font-size: 12px; color: #888; margin: 3px 0 0 3px;';
                helperText.textContent = `Redirects query to ${directedBotName} bot`;
                container.appendChild(helperText);
            }

            return container;
        }

        // Get URL parameter by name
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        async function getContext() {
            try {
                // Check if config was injected by server
                let data = window.__INITIAL_CONFIG__;

                // Fallback to API call if not injected (for backwards compatibility)
                if (!data) {
                    const response = await fetch('/context');
                    data = await response.json();
                }

                console.log('Config:', data);
                // Store form structure if available
                if (data.formStructure) {
                    formStructure = data.formStructure;
                }
                
                if (data.suggestedPrompts && data.suggestedPrompts.length > 0) {
                    mapToSuggestedPrompts(data.suggestedPrompts)
                }

                // populate form template
                botContext = data

                // Optical Read: when configured to surface upload-as-starter,
                // prepend the upload card to the suggested-prompts strip so
                // it sits with (or instead of) the bot's text suggestions.
                // botContext must be set first — createUploadStarterCard
                // reads the field list from it.
                if (data.isOpticalRead && data.opticalReadShowUploadOnStart) {
                    const starter = createUploadStarterCard();
                    if (starter) {
                        suggestedPromptsContainer.insertBefore(starter, suggestedPromptsContainer.firstChild);
                    }
                }
                
                document.title = data.name;
                botDisplayName=data.chatDisplayName;
                headerTitleDiv.textContent = data.chatDisplayName;

                firstMessageDiv.textContent = data.firstMessage;
                firstMessageLabel.textContent = data.chatDisplayName;

                // Update sticky bot name header
                const botNameDisplay = document.getElementById('botNameDisplay');
                if (botNameDisplay) {
                    botNameDisplay.textContent = data.chatDisplayName;
                }

                // Move suggested prompts after the first message
                firstMessageDiv.appendChild(suggestedPromptsContainer);


                // Check for orchestration URL parameters
                const autoPrompt = getUrlParameter('prompt');
                const sourceBot = getUrlParameter('source');
                const contextParam = getUrlParameter('context');
                const handoffConversationId = getUrlParameter('conversationId');

                // Store source for analytics/tracking
                if (sourceBot) {
                    console.log('Received handoff from:', sourceBot);
                    botContext.sourceBot = sourceBot;
                }

                // Adopt incoming conversationId as a cross-bot correlation ID.
                // Validate as UUID v4 to defend against malformed/forged URLs;
                // server-side validation is authoritative, this is a fail-fast.
                if (handoffConversationId) {
                    const uuidV4 = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
                    if (uuidV4.test(handoffConversationId)) {
                        conversationId = handoffConversationId;
                        console.log('Adopted handoff conversationId:', conversationId);
                    } else {
                        console.warn('Ignoring malformed handoff conversationId:', handoffConversationId);
                    }
                }

                // Adopt sender's tip-of-chain as the handoff seed. Server
                // re-validates and only consumes it on the first turn of a
                // conversation that has no prior local turns.
                const handoffChainHash = getUrlParameter('chainHash');
                if (handoffChainHash) {
                    if (/^[0-9a-f]{64}$/.test(handoffChainHash)) {
                        pendingHandoffHash = handoffChainHash;
                        console.log('Adopted handoff chainHash:', pendingHandoffHash);
                    } else {
                        console.warn('Ignoring malformed handoff chainHash:', handoffChainHash);
                    }
                }

                // Parse and store context (not output yet, available for future use)
                if (contextParam) {
                    try {
                        botContext.handoffContext = JSON.parse(decodeURIComponent(contextParam));
                        console.log('Received context:', botContext.handoffContext);
                    } catch (e) {
                        console.warn('Failed to parse context param:', e);
                    }
                }

                // Auto-send prompt to kickstart conversation
                if (autoPrompt) {
                    firstMessageContainer.classList.add('vanish');
                    console.log('Auto-sending prompt from URL:', autoPrompt);
                    
                    userInput.value = autoPrompt;
                    // Use setTimeout to ensure UI is ready
                    setTimeout(() => {
                        sendMessage();
                    }, 100);
                }
            } catch (e) {
                console.error(e)
            }
        }

        function unhideChatPane() {
            messageInputForm.classList.remove('vanish');
            showChatBtn.classList.add('hide');
            userInput.placeholder = "Only use fields for requested information.";
            hideForm();
        }
        function showForm() {
            messageInputForm.classList.add('vanish');
            formContentWrapper.classList.remove('vanish')
            showChatBtn.classList.remove('hide');
            formHiderBtn.classList.remove('vanish')
            formShowerBtn.classList.add('vanish')
        }
        function hideForm() {
            formContentWrapper.classList.add('vanish')
            formShowerBtn.classList.remove('vanish')
            formHiderBtn.classList.add('vanish')
        }

        // Event listeners
        const messageInputForm = document.getElementById('messageInputForm');
        const formFieldsForm = document.getElementById('formFieldsForm');

        messageInputForm.addEventListener('submit', sendMessage);
        formFieldsForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleFormSubmit();
        });
        showChatBtn.addEventListener('click', unhideChatPane)
        formShowerBtn.addEventListener('click', showForm)
        formHiderBtn.addEventListener('click', hideForm)

        // Drag down to hide form
        let dragStartY = 0;
        let isDragging = false;
        const DRAG_THRESHOLD = 50; // pixels to drag down before triggering hide

        formHiderBtn.addEventListener('touchstart', (e) => {
            dragStartY = e.touches[0].clientY;
            isDragging = true;
        }, { passive: true });

        formHiderBtn.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - dragStartY;
            if (deltaY > DRAG_THRESHOLD) {
                hideForm();
                isDragging = false;
            }
        }, { passive: true });

        formHiderBtn.addEventListener('touchend', () => {
            isDragging = false;
        }, { passive: true });

        // Mouse drag support for desktop
        formHiderBtn.addEventListener('mousedown', (e) => {
            dragStartY = e.clientY;
            isDragging = true;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaY = e.clientY - dragStartY;
            if (deltaY > DRAG_THRESHOLD) {
                hideForm();
                isDragging = false;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Close widget button
        const closeWidgetBtn = document.getElementById('closeWidgetBtn');
        if (closeWidgetBtn) {
            closeWidgetBtn.addEventListener('click', () => {
                window.closeWidget();
            });
        }

        getContext();

        // Widget control functions - can be called from anywhere in the chatbot
        window.closeWidget = function() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'mojulo-bot-close' }, '*');
            }
        };

        window.openWidget = function() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'mojulo-bot-open' }, '*');
            }
        };

        window.toggleWidget = function() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'mojulo-bot-toggle' }, '*');
            }
        };

        // Listen for focus request from parent widget
        window.addEventListener('message', (event) => {
            if (event.data.type === 'mojulo-bot-focus-input') {
                userInput.focus();
            }
        });
        
    </script>
</body>

</html>
